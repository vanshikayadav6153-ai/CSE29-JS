<!DOCTYPE html>
<html>
<head>
<title>Grade Calculator</title>

<script>
function calculateResult() {

    let n = document.getElementById("subjects").value;
    let total = 0;

    for (let i = 0; i < n; i++) {
        let x = parseFloat(prompt("Enter marks of subject " + (i + 1)));
        total += x;
    }

    let average = total / n;
    let grade;

    if (average >= 90) {
        grade = "A+";
    } 
    else if (average >= 75) {
        grade = "A";
    } 
    else if (average >= 60) {
        grade = "B";
    } 
    else if (average >= 50) {
        grade = "C";
    } 
    else {
        grade = "Fail";
    }

    document.getElementById("result").innerHTML =
        "Total Marks: " + total + "<br>" +
        "Average Marks: " + average + "<br>" +
        "Grade: " + grade;
}
</script>

</head>

<body>

<h1>Grade Calculator</h1>

<form>
    Number of Subjects:
    <input type="number" id="subjects">
</form>

<br>

<button onclick="calculateResult()">Calculate Result</button>

<br><br>

<div id="result"></div>

</body>
</html>
